<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>NexvyBeauty — Beleza com gestão inteligente</title>
    <meta name="description" content="NexvyBeauty — ERP e CRM com IA para profissionais da beleza">
    <meta name="author" content="Nexvy" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#EC4899" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NexvyBeauty" />
    
    <!-- Apple Touch Icons - múltiplos tamanhos para compatibilidade -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-128x128.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph — o crawler (WhatsApp/Facebook/LinkedIn) NÃO executa JS:
         estas tags TÊM de viver no HTML estático, nunca injetadas pelo React.
         og:image exige URL ABSOLUTA — caminho relativo não resolve no crawler. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nexvybeauty.com.br/" />
    <meta property="og:image" content="https://nexvybeauty.com.br/og-clientes-de-volta.png">
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="" />
    <meta name="twitter:image" content="https://nexvybeauty.com.br/og-clientes-de-volta.png">

    <!-- Boot styles: prevent white flash before React mounts -->
    <style>
      html, body {
        background: #0a0d14;
        color: #e5e7eb;
        margin: 0;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #root { min-height: 100vh; }
      #boot-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #0a0d14;
        z-index: 9999;
      }
      #boot-loader .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(236, 72, 153, 0.18);
        border-top-color: #EC4899;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      .app-mounted #boot-loader { display: none; }
      /* Gestão (gestao.*): boot em DOURADO lux (#dba341 = --primary do tema lux) */
      html.theme-nexvy-institucional #boot-loader .spinner {
        border-color: rgba(219, 163, 65, 0.18);
        border-top-color: #dba341;
      }
    </style>
    <!-- Título/descrição = a promessa real do hero da LP "Clientes de Volta". -->
  <meta property="og:title" content="Agenda cheia, sem gastar com anúncio — com quem já é sua cliente.">
  <meta name="twitter:title" content="Agenda cheia, sem gastar com anúncio — com quem já é sua cliente.">
  <meta property="og:description" content="Em 5 minutos por dia, a sua EquipIA varre suas conversas de WhatsApp, acha quem sumiu e escreve a mensagem no seu tom — e você só aprova.">
  <meta name="twitter:description" content="Em 5 minutos por dia, a sua EquipIA varre suas conversas de WhatsApp, acha quem sumiu e escreve a mensagem no seu tom — e você só aprova.">
  <!-- ── Meta Pixel (R1 da auditoria de funil) ──────────────────────────────
       Só instala no host de MARKETING (apex/LP). NÃO dispara em app.* nem gestao.*
       — público de retargeting não pode ser poluído com uso interno do produto.
       O ID vem do build (VITE_META_PIXEL_ID no .env do VPS; Vite substitui %VITE_*%).
       Sem ID configurado, o guard sai e NADA é instalado (falha segura).
       fbc/fbp ficam disponíveis p/ a CAPI — src/lib/tracking.ts já os coleta. -->
  <script>
    (function () {
      try {
        var PIXEL_ID = '%VITE_META_PIXEL_ID%';
        var h = location.hostname;
        if (h.indexOf('app.') === 0 || h.indexOf('gestao.') === 0) return;   // app autenticado: não rastreia
        if (!PIXEL_ID || PIXEL_ID.indexOf('VITE_') !== -1) return;           // env ausente: não instala
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
        n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
        document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', PIXEL_ID);
        fbq('track', 'PageView');
      } catch (e) { /* pixel nunca pode quebrar a LP */ }
    })();
  </script>

  <!-- Shell de gestão (gestao.*): tema "Nexvy Lux" (navy + dourado, fundo claro),
       aplicado ANTES do React montar p/ evitar flash. app.*/apex seguem no tema Beauty. -->
  <script>
    (function () {
      try {
        if (location.hostname.indexOf('gestao.') === 0) {
          document.documentElement.classList.add('theme-nexvy-institucional');
          document.title = 'Nexvy · Gestão';
          // theme-color = fundo lux claro (--background oklch(0.982 0.005 250) = #f7f9fc).
          var tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.setAttribute('content', '#f7f9fc');
        }
      } catch (e) {}
    })();
  </script>
</head>

  <body>
    <div id="root">
      <div id="boot-loader"><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
