project_id = "fzhlbwhdejumkyqosuvq"

[functions.platform-webhook-receiver]
verify_jwt = false

# Webhook público do Evolution Go (servidor externo -> plataforma). Sem JWT.
[functions.platform-evolution-webhook]
verify_jwt = false

# Webhook público do Evolution (servidor externo -> TENANT/salão). Sem JWT no
# gateway (a Evolution não manda Authorization). Auth real na função = a
# instância do payload PRECISA existir em evolution_instances (payload de
# instância desconhecida é ignorado). Já rodava assim em prod (deploy com
# --no-verify-jwt); o bloco aqui torna isso determinístico em redeploys.
# Eventos de HISTÓRICO (MESSAGES_SET/CHATS_SET/CONTACTS_SET, F6) são
# encaminhados server-to-server pra evolution-history-sync — que fica DE FORA
# deste arquivo de propósito: lá o gateway exige JWT (default) e a função ainda
# valida Bearer == service_role + apikey do payload vs instance_token.
[functions.evolution-webhook]
verify_jwt = false

# Webhook público da WhatsApp Cloud API (Meta -> plataforma, número de vendas).
# Auth real = X-Hub-Signature-256 (HMAC do app_secret) validada na função.
[functions.platform-meta-whatsapp-webhook]
verify_jwt = false

# Webhook público de DMs do Instagram (Meta -> plataforma). Sem JWT.
# Auth real = X-Hub-Signature-256 (HMAC do app_secret) validada na função.
[functions.platform-instagram-webhook]
verify_jwt = false

# Cérebro de vendas (F2): chamada server-to-server do webhook. Sem JWT.
# Auth real = service-role key OU x-brain-secret (BRAIN_INTERNAL_SECRET) na função.
[functions.platform-sales-brain]
verify_jwt = false

# Dispatcher da Conversions API (Meta) do funil Ads Inbound (G4). Chamada de
# máquina (cron/manual). Sem JWT. Auth = service-role OU x-brain-secret na função.
[functions.platform-capi-send]
verify_jwt = false

# Runtime PÚBLICO dos formulários de captação da plataforma. Recebe submissão de
# lead EXTERNO (embed anônimo) e usa SERVICE_ROLE internamente — o gateway não
# pode exigir JWT, senão o embed público é rejeitado. Auth = pública por design
# (validação de form ativo + rate-limit + allowlists server-side na própria EF).
[functions.platform-form-submit]
verify_jwt = false

# Callback público do OAuth de Meta Ads (NexvyAds F1). Recebido pelo REDIRECT do
# browser após consentimento — não há JWT. Auth real = state ASSINADO (HMAC)
# validado na própria função (ads-oauth-state.ts). ads-oauth-start e ads-sync
# NÃO entram aqui: exigem JWT super_admin (verify_jwt=true, o default).
[functions.ads-oauth-callback]
verify_jwt = false

# Webhook público do Apify (C9 F0 — motor de extração de leads IG). Apify chama de
# volta ao fim do run, sem JWT. Auth real na função = extraction_id (query) casa com
# o job + run id do payload casa com apify_run_id gravado + dataset só é lido com o
# APIFY_TOKEN do projeto (prova de posse). leads-extraction-start NÃO entra aqui:
# exige JWT super_admin (verify_jwt=true, o default).
[functions.leads-extraction-webhook]
verify_jwt = false

# Import de perfis JÁ coletados direto no staging do C9 (irmão do webhook, mas recebe
# os perfis no POST em vez de baixar do dataset). Sem JWT no gateway; auth real na
# função = x-import-secret (LEADS_IMPORT_SECRET) OU JWT super_admin. Serve o pusher
# local (dados coletados via MCP) e a feature in-app de upload de vídeo.
[functions.leads-import-profiles]
verify_jwt = false

# EF DESCARTÁVEL de evals (braço EVALS-V1): régua binária do brain de vendas.
# Sem JWT — auth real = x-brain-secret (BRAIN_INTERNAL_SECRET) na função. NÃO
# deployar em produção junto com o resto; roda sob demanda e limpa os efêmeros.
[functions.tmp-eval-agents]
verify_jwt = false

# Aplica o payload do wizard de onboarding nas tabelas reais (empresa/horários/setores/
# negócios/agentes/equipes). Chamada com token PÚBLICO + session_token (empresa externa via
# link), então o gateway não pode exigir JWT. Auth real na função = token_hash (SHA-256 do
# token) casa com onboarding_submissions.token_hash + session_token + org não travada. O fluxo
# autenticado (submission_id + Bearer) valida o JWT dentro da própria função.
[functions.apply-onboarding]
verify_jwt = false
