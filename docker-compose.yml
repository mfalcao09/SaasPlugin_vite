# SaasPlugin_vite — docker-compose (padrão Traefik FILE PROVIDER)
#
# O roteamento HTTP/HTTPS NÃO é feito por labels Docker neste compose.
# Quem define routers/services/middlewares é o Traefik central via FILE PROVIDER:
#   /opt/stacks/traefik/dynamic/<container>.yml   (watch:true, hot-reload)
# Os templates-fonte vivem em  infra/traefik/<APP_DIR>.yml.template  e são
# renderizados pelo script  infra/deploy-vps.sh  (substitui DOMAIN + container).
#
# Este compose só CONSTRÓI e RODA os containers na rede externa `traefik-public`.
# Sem labels Traefik. Sem `ports` publicados — o Traefik alcança cada container
# pela rede compartilhada na porta 80 (nginx interno, ver infra/nginx.conf).

services:

  nexvy-beauty:
    build:
      context: .
      dockerfile: infra/Dockerfile.app
      args:
        APP_DIR: NexvyBeauty
    container_name: nexvy-beauty
    restart: unless-stopped
    networks: [traefik-public]
    env_file: .env

  nexvy-oficinas:
    build:
      context: .
      dockerfile: infra/Dockerfile.app
      args:
        APP_DIR: NexvyOficinas
    container_name: nexvy-oficinas-vite
    restart: unless-stopped
    networks: [traefik-public]
    env_file: .env

  barbeiro-pro:
    build:
      context: .
      dockerfile: infra/Dockerfile.app
      args:
        APP_DIR: BarbeiroPro
    container_name: nexvy-barbeiro
    restart: unless-stopped
    networks: [traefik-public]
    env_file: .env

  nexvy-foods:
    build:
      context: .
      dockerfile: infra/Dockerfile.app
      args:
        APP_DIR: NexvyFoods
    container_name: nexvy-foods
    restart: unless-stopped
    networks: [traefik-public]
    env_file: .env

  nexvy-gym:
    build:
      context: .
      dockerfile: infra/Dockerfile.app
      args:
        APP_DIR: NexvyGYM
    container_name: nexvy-gym
    restart: unless-stopped
    networks: [traefik-public]
    env_file: .env

  nexvy-payments:
    build:
      context: .
      dockerfile: infra/Dockerfile.app
      args:
        APP_DIR: NexvyPayments
    container_name: nexvy-payments
    restart: unless-stopped
    networks: [traefik-public]
    env_file: .env

networks:
  traefik-public:
    external: true
