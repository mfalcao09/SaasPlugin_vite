services:

  nexvy-beauty:
    build:
      context: .
      dockerfile: infra/Dockerfile.app
      args:
        APP_DIR: NexvyBeauty
    container_name: nexvy-beauty
    restart: unless-stopped
    networks: [traefik-public]
    env_file: .env
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.nexvy-beauty-http.rule=Host(`nexvybeauty.com.br`) || Host(`www.nexvybeauty.com.br`)
      - traefik.http.routers.nexvy-beauty-http.entrypoints=web
      - traefik.http.routers.nexvy-beauty-http.middlewares=redirect-to-https
      - traefik.http.routers.nexvy-beauty-https.rule=Host(`nexvybeauty.com.br`) || Host(`www.nexvybeauty.com.br`)
      - traefik.http.routers.nexvy-beauty-https.entrypoints=websecure
      - traefik.http.routers.nexvy-beauty-https.tls.certresolver=letsencrypt
      - traefik.http.services.nexvy-beauty.loadbalancer.server.port=80

