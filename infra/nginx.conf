server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # index.html NUNCA em cache: o browser sempre revalida o índice após um
    # deploy e pega as refs de chunk NOVAS. Sem isso, abas abertas durante o
    # deploy seguram o índice velho -> chunk antigo 404 -> ChunkLoadError
    # ("A versão local ficou desatualizada"). try_files cai aqui via redirect
    # interno, então a SPA inteira herda o no-cache do shell.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Assets com hash no nome = imutáveis (cache 1 ano). Hash muda a cada build,
    # então nunca há colisão de versão.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
